<!DOCTYPE html>
<html>

<head>
<title>AgentHubs</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#1e1e1e;
padding:20px;
overflow:auto;
}

.agent{
padding:10px;
background:#333;
margin:6px 0;
cursor:pointer;
}

.agent:hover{
background:#4da6ff;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
padding:20px;
overflow:auto;
}

.inputBox{
display:flex;
background:#1e1e1e;
padding:10px;
}

input{
flex:1;
padding:10px;
background:#333;
border:none;
color:white;
}

button{
padding:10px;
background:#4da6ff;
border:none;
cursor:pointer;
}

img{
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>AgentHubs</h3>

<div class="agent" onclick="setAgent('startup')">Startup Agent</div>
<div class="agent" onclick="setAgent('study')">Study Agent</div>
<div class="agent" onclick="setAgent('content')">Content Agent</div>

<h4>AI Tools</h4>

<div class="agent" onclick="setAgent('image')">AI Image Generator</div>
<div class="agent" onclick="setAgent('search')">AI Search Engine</div>

<h4>Marketplace</h4>

<div class="agent" onclick="setAgent('seo')">SEO Agent</div>
<div class="agent" onclick="setAgent('youtube')">YouTube Agent</div>
<div class="agent" onclick="setAgent('marketing')">Marketing Bot</div>
<div class="agent" onclick="setAgent('coding')">Coding Helper</div>

</div>

<div class="main">

<div id="chat" class="chat"></div>

<div class="inputBox">

<input id="input" placeholder="Ask AI...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let currentAgent="startup"

function setAgent(agent){
currentAgent=agent
}

async function send(){

let input=document.getElementById("input").value
let chat=document.getElementById("chat")

chat.innerHTML += "<p><b>You:</b> "+input+"</p>"

if(currentAgent==="image"){

const res=await fetch("/image",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({prompt:input})

})

const data=await res.json()

chat.innerHTML += "<img src='"+data.image+"' width='300'>"

return
}

if(currentAgent==="search"){

const res=await fetch("/search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({query:input})

})

const data=await res.json()

chat.innerHTML += "<p><b>Search:</b> "+data.answer+"</p>"

return
}

const res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:input,
agent:currentAgent
})

})

const data=await res.json()

chat.innerHTML += "<p><b>AI:</b> "+data.reply+"</p>"

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<title>AgentHubs</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
height:100vh;
}

.sidebar{
width:200px;
background:#1e1e1e;
padding:20px;
}

.agent{
padding:10px;
background:#333;
margin:5px 0;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
padding:20px;
overflow:auto;
}

.inputBox{
display:flex;
background:#1e1e1e;
padding:10px;
}

input{
flex:1;
padding:10px;
background:#333;
border:none;
color:white;
}

button{
padding:10px;
background:#4da6ff;
border:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>AgentHubs</h3>

<div class="agent" onclick="setAgent('startup')">Startup</div>
<div class="agent" onclick="setAgent('study')">Study</div>
<div class="agent" onclick="setAgent('content')">Content</div>

</div>

<div class="main">

<div id="chat" class="chat"></div>

<div class="inputBox">

<input id="input" placeholder="Ask AI...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let currentAgent="startup"

function setAgent(agent){
currentAgent=agent
}

async function send(){

let input=document.getElementById("input").value
let chat=document.getElementById("chat")

chat.innerHTML += "<p><b>You:</b> "+input+"</p>"

const res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:input,
agent:currentAgent
})

})

const data=await res.json()

chat.innerHTML += "<p><b>AI:</b> "+data.reply+"</p>"

}

</script>

</body>
</html>

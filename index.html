<!DOCTYPE html>
<html>

<head>

<title>AgentHubs</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#1b1b1b;
padding:20px;
}

.agent{
padding:10px;
background:#2a2a2a;
margin:6px 0;
cursor:pointer;
border-radius:5px;
}

.agent:hover{
background:#3a3a3a;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:20px;
}

.inputBox{
display:flex;
padding:10px;
background:#1b1b1b;
}

.inputBox input{
flex:1;
padding:10px;
border:none;
background:#2a2a2a;
color:white;
}

.inputBox button{
padding:10px;
background:#4da6ff;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AgentHubs</h2>

<div class="agent" onclick="setAgent('startup')">Startup</div>
<div class="agent" onclick="setAgent('study')">Study</div>
<div class="agent" onclick="setAgent('content')">Content</div>
<div class="agent" onclick="setAgent('marketing')">Marketing</div>
<div class="agent" onclick="setAgent('research')">Research</div>
<div class="agent" onclick="setAgent('photo')">Photo</div>
<div class="agent" onclick="setAgent('image')">Image</div>

<hr>

<button onclick="mode='ai'">AI Mode</button>
<button onclick="mode='search'">Search Mode</button>

</div>

<div class="main">

<div id="chat" class="chat"></div>

<div class="inputBox">

<input id="input" placeholder="Ask anything">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let currentAgent="startup"
let mode="ai"

function setAgent(agent){
currentAgent=agent
}

async function send(){

const input=document.getElementById("input").value

const chat=document.getElementById("chat")

chat.innerHTML += "<p><b>You:</b> "+input+"</p>"

if(mode==="ai"){

if(currentAgent==="image"){

const res=await fetch("/image",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:input
})

})

const data=await res.json()

chat.innerHTML += "<img src='"+data.image+"' width='300'>"

}else{

const res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:input,
agent:currentAgent,
user:"user1"
})

})

const data=await res.json()

chat.innerHTML += "<p><b>AI:</b> "+data.reply+"</p>"

}

}

if(mode==="search"){

const res=await fetch("/search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
query:input
})

})

const data=await res.json()

chat.innerHTML += "<p><b>Search:</b> "+data.answer+"</p>"

}

}

</script>

</body>
</html>
